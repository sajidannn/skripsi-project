global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ─── Scrape jobs ──────────────────────────────────────────────────────────────

scrape_configs:

  # Laptop: Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          vm: laptop
          role: monitoring

  # VM 1: API Server OS Metrics
  - job_name: node_exporter_api
    static_configs:
      - targets: ['192.168.10.183:9100']
        labels:
          vm: vm1
          role: api_server

  # VM 1: API Container Metrics (cAdvisor)
  - job_name: cadvisor_api
    static_configs:
      - targets: ['192.168.10.183:8081']
        labels:
          vm: vm1
          role: api_server

  # VM 2: DB Server OS Metrics
  - job_name: node_exporter_db
    static_configs:
      - targets: ['192.168.10.243:9100']
        labels:
          vm: vm2
          role: db_server

  # VM 2: PostgreSQL Metrics
  - job_name: postgres_exporter
    static_configs:
      - targets: ['192.168.10.243:9187']
        labels:
          vm: vm2
          role: db_server
