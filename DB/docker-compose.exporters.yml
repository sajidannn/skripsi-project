services:
  # ── Node Exporter (VM 2 host metrics) ─────────────────────────────────────
  # Prometheus di VM 1 scrape port 9100 ini dari remote
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: pos-node-exporter-db
    network_mode: host         # host mode agar bisa akses /proc /sys secara akurat
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.diskstats
      - --collector.meminfo
    restart: unless-stopped
    # port 9100 otomatis expose karena network_mode: host

  # ── Postgres Exporter ─────────────────────────────────────────────────────
  # Scrape PostgreSQL internal stats: connections, tuples, locks, cache
  # Ganti DSN sesuai mode yang sedang berjalan (single atau multi)
  # Default: single-DB
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pos-postgres-exporter
    environment:
      # Single-DB mode: pos_single (port 5432)
      # Multi-DB mode:  pos_master (port 5433)
      # Override via env: DATA_SOURCE_NAME=... docker compose up -d
      DATA_SOURCE_NAME: "${DATA_SOURCE_NAME:-postgresql://postgres:supersecret@localhost:5432/pos_single?sslmode=disable}"
    network_mode: host         # akses localhost postgres langsung
    restart: unless-stopped
    # port 9187 otomatis expose karena network_mode: host
