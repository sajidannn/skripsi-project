services:
  db:
    image: postgres:16
    container_name: pg-pos-single
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: pos_single
    ports:
      - "5432:5432"
    volumes:
      - pgdata_single:/var/lib/postgresql/data
      # Schema-only init — no seeder SQL here; data comes from the seeder service
      - ./schema/single-db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_single"]
      interval: 5s
      timeout: 5s
      retries: 15

  seeder:
    build:
      context: ./seeder
      dockerfile: Dockerfile
    container_name: pos-seeder-single
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SEED_MODE=single
      - SEED_SCALE=${SCALE:-small}
      - DATABASE_URL=postgres://postgres:supersecret@db:5432/pos_single?sslmode=disable
    volumes:
      - ./schema:/app/schema:ro
    restart: "no"   # run once then exit (seeder is a one-shot job)

volumes:
  pgdata_single:
