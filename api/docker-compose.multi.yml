services:
  api:
    build: .
    container_name: pos-api-multi
    environment:
      DB_MODE: multi
      MASTER_DSN: postgres://postgres:supersecret@192.168.10.243:5433/pos_master?sslmode=disable
      TENANT_DB_HOST: 192.168.10.243
      TENANT_DB_PORT: "5433"
      PORT: "8080"
      JWT_SECRET: change-me-in-production
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
