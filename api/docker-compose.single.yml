services:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-api-single
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DEBUG: "false"
      DB_MODE: "single"
      SINGLE_DSN: "postgres://postgres:secret@db-single:5432/pos_single?sslmode=disable"
      JWT_SECRET: "change-me-in-production"
    depends_on:
      db-single:
        condition: service_healthy

  # ── Postgres (shared single DB) ─────────────────────────────────────────────
  db-single:
    image: postgres:16-alpine
    container_name: pos-db-single
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: pos_single
    ports:
      - "5432:5432"
    volumes:
      - db-single-data:/var/lib/postgresql/data
      - ./migrations/singledb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_single"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-single-data:
